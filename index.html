<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moonshots — Live Pipeline</title>
  <style>
    :root {
      --bg: #07070f;
      --surface: #0f0f1c;
      --surface-2: #16162a;
      --border: rgba(255,255,255,0.07);
      --text: #e2e2ee;
      --muted: #5a5a7a;
      --purple: #7c3aed;
      --purple-light: #a78bfa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0c0c1e 0%, #160828 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, #7c3aed, #4338ca); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-name { font-size: 19px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .logo-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .live-pill { display: flex; align-items: center; gap: 6px; background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.25); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: #34d399; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    .ts { font-size: 11px; color: var(--muted); }

    /* ── Stat strip ── */
    .stat-strip { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
    .stat {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 20px; border-right: 1px solid var(--border); white-space: nowrap;
      background: transparent; border-top: none; border-bottom: none; border-left: none;
      color: var(--text); cursor: pointer; transition: background .15s;
    }
    .stat:hover { background: rgba(255,255,255,.03); }
    .stat.active { background: rgba(124,58,237,.15); }
    .s-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .s-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .s-count { font-size: 13px; font-weight: 600; }

    /* ── Filter bar ── */
    .filter-bar {
      display: none; align-items: center; justify-content: space-between;
      background: rgba(124,58,237,.1); border-bottom: 1px solid rgba(124,58,237,.25);
      padding: 8px 32px; font-size: 12px; color: #a78bfa;
    }
    .filter-bar strong { color: #c4b5fd; }
    .filter-clear { background: transparent; border: 1px solid rgba(124,58,237,.4); color: #a78bfa; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: inherit; }
    .filter-clear:hover { background: rgba(124,58,237,.2); }

    /* ── Config banner ── */
    #cfg-banner { background: rgba(245,158,11,.1); border-bottom: 1px solid rgba(245,158,11,.25); padding: 10px 32px; font-size: 12px; color: #fbbf24; display: none; }

    /* ── Main ── */
    main { padding: 28px 32px; max-width: 1640px; margin: 0 auto; }
    .region-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; }
    @media(max-width:920px){ .region-pair{ grid-template-columns:1fr; } main{ padding:20px 16px; } header{ padding:14px 16px; } }

    /* ── Section ── */
    .section { margin-bottom: 4px; }
    .sec-header { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; }
    .sec-flag { font-size: 16px; }
    .sec-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
    .sec-badge { background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 7px; font-size: 10px; color: var(--muted); }
    .sec-line { flex: 1; height: 1px; background: var(--border); }
    .add-btn {
      width: 24px; height: 24px; border-radius: 6px; background: transparent; cursor: pointer;
      border: 1px dashed var(--border); color: var(--muted); font-size: 16px; line-height: 1;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s;
    }
    .add-btn:hover { border-color: var(--purple-light); color: var(--purple-light); background: rgba(124,58,237,.1); }

    /* ── Cards ── */
    .cards { display: flex; flex-direction: column; gap: 8px; }

    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
      padding: 12px 14px; display: flex; flex-direction: column; gap: 9px;
      transition: border-color .2s, opacity .2s, transform .2s;
    }
    .card:hover { border-color: rgba(124,58,237,.25); }

    /* Card top row: num + title + del */
    .card-top { display: flex; align-items: flex-start; gap: 8px; }
    .card-num { font-size: 10px; color: var(--muted); font-family: monospace; padding-top: 3px; flex-shrink: 0; }
    .card-title {
      flex: 1; font-size: 12.5px; line-height: 1.55; color: var(--text);
      cursor: text; outline: none; word-break: break-word;
      border-bottom: 1px solid transparent; transition: border-color .15s;
    }
    .card-title[contenteditable="true"] { border-bottom-color: var(--purple-light); }
    .del-btn {
      opacity: 0; background: transparent; border: none; color: var(--muted);
      cursor: pointer; font-size: 13px; padding: 2px 5px; border-radius: 4px;
      flex-shrink: 0; transition: all .15s; line-height: 1;
    }
    .card:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #f87171; background: rgba(239,68,68,.12); }
    .card.is-editing .del-btn { opacity: 0 !important; pointer-events: none; }

    /* Card bottom row: owner + status */
    .card-bot { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .owner-wrap { display: flex; align-items: center; gap: 5px; flex: 1; min-width: 0; }
    .owner-icon { font-size: 11px; flex-shrink: 0; opacity: .5; }
    .owner-input {
      background: transparent; border: none; border-bottom: 1px solid transparent;
      color: var(--muted); font-size: 11px; font-family: inherit; outline: none;
      width: 100%; min-width: 0; padding: 1px 0; transition: all .15s;
    }
    .owner-input::placeholder { color: var(--muted); opacity: .55; }
    .owner-input:hover { border-bottom-color: var(--border); }
    .owner-input:focus { border-bottom-color: var(--purple-light); color: var(--text); }

    /* ── Status badge ── */
    .sbadge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
      cursor: pointer; border: none; white-space: nowrap; flex-shrink: 0;
      transition: filter .15s, transform .1s;
    }
    .sbadge:hover { filter: brightness(1.2); transform: translateY(-1px); }
    .sbadge:active { transform: translateY(0); }
    .bdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .s-backlog    { background: rgba(107,114,128,.18); color: #9ca3af; }
    .s-in-progress{ background: rgba(59,130,246,.15);  color: #60a5fa; }
    .s-testing    { background: rgba(245,158,11,.15);  color: #fbbf24; }
    .s-live       { background: rgba(16,185,129,.15);  color: #34d399; }
    .s-done       { background: rgba(20,184,166,.15);  color: #2dd4bf; }
    .s-blocked    { background: rgba(239,68,68,.15);   color: #f87171; }

    /* ── New item card ── */
    .new-item-card { border-style: dashed; border-color: rgba(124,58,237,.35); background: rgba(124,58,237,.05); }
    .new-item-input {
      width: 100%; background: transparent; border: none; color: var(--text);
      font-size: 13px; font-family: inherit; outline: none; padding: 2px 0;
    }
    .new-item-input::placeholder { color: var(--muted); }

    /* ── Moonshot section ── */
    .moonshot-wrap { background: linear-gradient(135deg, rgba(124,58,237,.08), rgba(79,70,229,.08)); border: 1px solid rgba(124,58,237,.25); border-radius: 14px; padding: 18px 20px; margin-bottom: 28px; }
    .moonshot-wrap .sec-title { color: #a78bfa; }
    .moonshot-wrap .sec-header::before { content: ''; width: 3px; height: 15px; background: linear-gradient(180deg, #7c3aed, #4338ca); border-radius: 2px; }
    .moonshot-wrap .card { background: rgba(124,58,237,.08); border-color: rgba(124,58,237,.2); }

    /* ── CRM Overall ── */
    .overall-wrap { margin-bottom: 28px; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 15px; font-size: 13px; transform: translateY(60px); opacity: 0; transition: all .3s cubic-bezier(.34,1.56,.64,1); z-index: 999; }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ── Loading ── */
    .loading { display: flex; align-items: center; justify-content: center; height: 180px; color: var(--muted); gap: 9px; }
    .spin { width: 15px; height: 15px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="cfg-banner">
  ⚡ Running in <strong>local mode</strong> — changes only save in this browser. Add your Firebase config to share across the team.
</div>

<header>
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <div>
      <div class="logo-name">Moonshots</div>
      <div class="logo-sub">Live Pipeline Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-pill"><div class="live-dot"></div> Live</div>
    <div class="ts" id="ts">—</div>
  </div>
</header>

<!-- Stat strip — click any badge to filter -->
<div class="stat-strip">
  <button class="stat" id="stat-backlog"     onclick="_filter('backlog')"    ><div class="s-dot" style="background:#6b7280"></div><span class="s-label">Backlog</span>    <span class="s-count" id="c-backlog">0</span></button>
  <button class="stat" id="stat-in-progress" onclick="_filter('in-progress')"><div class="s-dot" style="background:#3b82f6"></div><span class="s-label">In Progress</span><span class="s-count" id="c-in-progress">0</span></button>
  <button class="stat" id="stat-testing"     onclick="_filter('testing')"    ><div class="s-dot" style="background:#f59e0b"></div><span class="s-label">Testing</span>    <span class="s-count" id="c-testing">0</span></button>
  <button class="stat" id="stat-live"        onclick="_filter('live')"       ><div class="s-dot" style="background:#10b981"></div><span class="s-label">Live</span>       <span class="s-count" id="c-live">0</span></button>
  <button class="stat" id="stat-blocked"     onclick="_filter('blocked')"    ><div class="s-dot" style="background:#ef4444"></div><span class="s-label">Blocked</span>   <span class="s-count" id="c-blocked">0</span></button>
  <button class="stat" id="stat-done"        onclick="_filter('done')"       ><div class="s-dot" style="background:#14b8a6"></div><span class="s-label">Done</span>       <span class="s-count" id="c-done">0</span></button>
</div>

<div class="filter-bar" id="filterBar">
  <span>Filtering: <strong id="filterLabel"></strong></span>
  <button class="filter-clear" onclick="_filter(null)">✕ Clear filter</button>
</div>

<main id="main">
  <div class="loading"><div class="spin"></div> Loading pipeline…</div>
</main>

<div id="toast"></div>

<script type="module">
  // ─── FIREBASE CONFIG ──────────────────────────────────────────────────────
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyCVPxhbS4UFo95ZsXb01fmRjCqWiR93Rs8",
    authDomain:        "moonshots-dashboard.firebaseapp.com",
    databaseURL:       "https://moonshots-dashboard-default-rtdb.firebaseio.com",
    projectId:         "moonshots-dashboard",
    storageBucket:     "moonshots-dashboard.firebasestorage.app",
    messagingSenderId: "968742091046",
    appId:             "1:968742091046:web:69328e9a8a411ff85629e7"
  };
  // ─────────────────────────────────────────────────────────────────────────

  const STATUS_CYCLE = ['backlog','in-progress','testing','live','done','blocked'];
  const STATUS_LABEL = { backlog:'Backlog', 'in-progress':'In Progress', testing:'Testing', live:'✦ Live', done:'Done', blocked:'⚠ Blocked' };

  const SECTIONS = [
    { key:'india-app',   label:'India — App',               flag:'🇮🇳', region:'india'   },
    { key:'india-crm',   label:'India — CRM',               flag:'🇮🇳', region:'india'   },
    { key:'foreign-app', label:'Foreign — App',             flag:'🌍',  region:'foreign' },
    { key:'foreign-crm', label:'Foreign — CRM',             flag:'🌍',  region:'foreign' },
    { key:'crm-overall', label:'CRM Overall (IN + Foreign)', flag:'📊',  region:'overall' },
    { key:'moonshot',    label:'Moonshot',                  flag:'🚀',  region:'moonshot'},
  ];

  const SEED = [
    { id:'ia-1', cat:'india-app',   title:'All Referral traffic on abc2.0 — zero leaks target (HSM + Vernac)',                                                        status:'in-progress' },
    { id:'ia-2', cat:'india-app',   title:'Horoscope UI changes + loveAstro-level Tarot Reading experience',                                                          status:'in-progress' },
    { id:'ia-3', cat:'india-app',   title:'Nudge Experiment — HSM/Vernac user language ID mapping, Vernac priority order + different consultants',                    status:'in-progress' },
    { id:'ia-4', cat:'india-app',   title:'Low Wallet Balance (<₹100) chat enablement — consultant mapping by user language ID',                                      status:'in-progress' },
    { id:'ia-5', cat:'india-app',   title:'abc-compliance system instruction A/B — release + conclude with priority order (Varun)',                                   status:'in-progress' },
    { id:'ia-6', cat:'india-app',   title:'Human Profiling upgrade — Learned Batch Release (Nandita, Mahima + iterated profiles)',                                   status:'in-progress' },
    { id:'ia-7', cat:'india-app',   title:'Timing-optimised conversation experiment — high sync, rp-level chat, target 1 HSM',                                       status:'in-progress' },
    { id:'ic-1', cat:'india-crm',   title:'RCS new bot integrations — India',                                                                                        status:'in-progress' },
    { id:'ic-2', cat:'india-crm',   title:'RCS data Karix — India Acquisition',                                                                                      status:'in-progress' },
    { id:'ic-3', cat:'india-crm',   title:'Puneet & Anuradha WhatsApp number integrations',                                                                          status:'in-progress' },
    { id:'ic-4', cat:'india-crm',   title:'Pandit Ji integration',                                                                                                   status:'in-progress' },
    { id:'fa-1', cat:'foreign-app', title:'abc PO iterations — improve avg rating + PO to R1 for Native Users (Lumus + AT Native)',                                  status:'in-progress' },
    { id:'fa-2', cat:'foreign-app', title:'NRI Referral — new abc2.0 profile launch (↑ avg duration, ↑ ARPU base)',                                                 status:'in-progress' },
    { id:'fa-3', cat:'foreign-app', title:'Lumus + AT Native Referral — new abc2.0 profile launch (↑ avg duration, ↑ ARPU base)',                                   status:'in-progress' },
    { id:'fa-4', cat:'foreign-app', title:'AI Astrologer Skill Consultant in List for new user traffic — close AI positioning + retire old profiles',                status:'in-progress' },
    { id:'fc-1', cat:'foreign-crm', title:'RCS foreign integration (TAT ≤ 7 days)',                                                                                  status:'in-progress' },
    { id:'fc-2', cat:'foreign-crm', title:'SMS foreign — Karix data campaign',                                                                                       status:'in-progress' },
    { id:'fc-3', cat:'foreign-crm', title:'New vendor phone number purchase — testing',                                                                              status:'in-progress' },
    { id:'co-1', cat:'crm-overall', title:'User segmentation based on chat behaviour',                                                                                status:'in-progress' },
    { id:'co-2', cat:'crm-overall', title:'Pulse integrations and development',                                                                                       status:'in-progress' },
    { id:'co-3', cat:'crm-overall', title:'Unpaid India WhatsApp — open problem statement',                                                                           status:'backlog'     },
    { id:'ms-1', cat:'moonshot',    title:'Hariram as Self-Improving Consultant — human-in-the-loop Slack approvals + Daily Analysis Publish',                       status:'in-progress' },
  ];

  // ── State ─────────────────────────────────────────────────────────────────
  let items        = {};
  let firebaseMode = false;
  let activeFilter = null;
  let dbRef, onValueFn, updateFn, removeFn, setFn, getFn;

  // ── Firebase init ─────────────────────────────────────────────────────────
  async function tryFirebase() {
    if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') return false;
    try {
      const { initializeApp }                                    = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
      const { getDatabase, ref, onValue, update, set, get, remove } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
      const app = initializeApp(FIREBASE_CONFIG);
      const db  = getDatabase(app);
      dbRef     = ref(db, 'moonshots/items');
      onValueFn = onValue;
      updateFn  = (id, data) => update(ref(db, `moonshots/items/${id}`), data);
      removeFn  = (id)       => remove(ref(db, `moonshots/items/${id}`));
      setFn     = (data)     => set(dbRef, data);
      getFn     = ()         => get(dbRef);
      return true;
    } catch(e) {
      console.warn('Firebase init failed:', e);
      return false;
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  const $     = id => document.getElementById(id);
  const genId = cat => `${cat.replace(/-/g,'')}_${Date.now()}`;

  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function nextStatus(s) { return STATUS_CYCLE[(STATUS_CYCLE.indexOf(s)+1) % STATUS_CYCLE.length]; }

  function timeAgo(ts) {
    if (!ts) return '—';
    const m = Math.floor((Date.now()-ts)/60000);
    if (m < 1)  return 'Updated just now';
    if (m < 60) return `Updated ${m}m ago`;
    const h = Math.floor(m/60);
    return h < 24 ? `Updated ${h}h ago` : `Updated ${Math.floor(h/24)}d ago`;
  }

  // ── Stats + filter ────────────────────────────────────────────────────────
  function refreshStats() {
    const counts = { backlog:0,'in-progress':0,testing:0,live:0,done:0,blocked:0 };
    Object.values(items).forEach(i => { if (i.status in counts) counts[i.status]++; });
    STATUS_CYCLE.forEach(s => {
      const c = $(`c-${s}`); if (c) c.textContent = counts[s];
      const b = $(`stat-${s}`); if (b) b.classList.toggle('active', activeFilter === s);
    });
  }

  // Exposed to inline onclick
  window._filter = status => {
    activeFilter = (activeFilter === status || status === null) ? null : status;
    render();
  };

  // ── CRUD ──────────────────────────────────────────────────────────────────
  async function persist(id, changes) {
    Object.assign(items[id], changes, { at: Date.now() });
    if (firebaseMode) await updateFn(id, { ...changes, at: items[id].at });
    else localStorage.setItem('moonshots', JSON.stringify(items));
    $('ts').textContent = 'Updated just now';
  }

  async function addItem(cat, title) {
    const id   = genId(cat);
    const item = { id, cat, title, status:'backlog', owner:'', at: Date.now() };
    items[id]  = item;
    if (firebaseMode) await updateFn(id, item);
    else { localStorage.setItem('moonshots', JSON.stringify(items)); render(); }
    showToast('Item added');
  }

  async function deleteItem(id) {
    delete items[id];
    if (firebaseMode) await removeFn(id);
    else { localStorage.setItem('moonshots', JSON.stringify(items)); render(); }
    showToast('Deleted');
  }

  // ── Card ──────────────────────────────────────────────────────────────────
  function makeCard(item, num) {
    const s   = item.status || 'backlog';
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div class="card-top">
        <span class="card-num">${num}</span>
        <div class="card-title" contenteditable="false" spellcheck="false">${item.title}</div>
        <button class="del-btn" title="Delete">✕</button>
      </div>
      <div class="card-bot">
        <div class="owner-wrap">
          <span class="owner-icon">👤</span>
          <input class="owner-input" value="${item.owner||''}" placeholder="Add owner…" />
        </div>
        <button class="sbadge s-${s}"><span class="bdot"></span>${STATUS_LABEL[s]}</button>
      </div>`;

    const titleEl   = div.querySelector('.card-title');
    const ownerEl   = div.querySelector('.owner-input');
    const statusBtn = div.querySelector('.sbadge');
    const delBtn    = div.querySelector('.del-btn');

    // ── Title: click to edit, Enter/Escape to finish ──────────────────────
    titleEl.addEventListener('click', () => {
      titleEl.contentEditable = 'true';
      div.classList.add('is-editing');
      titleEl.focus();
      const r = document.createRange();
      r.selectNodeContents(titleEl);
      r.collapse(false);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(r);
    });
    titleEl.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); titleEl.blur(); }
      if (e.key === 'Escape') { titleEl.textContent = item.title; titleEl.blur(); }
    });
    titleEl.addEventListener('blur', () => {
      titleEl.contentEditable = 'false';
      div.classList.remove('is-editing');
      const val = titleEl.textContent.trim();
      if (val && val !== item.title) {
        item.title = val;
        persist(item.id, { title: val });
      } else {
        titleEl.textContent = item.title;
      }
    });

    // ── Owner: blur to save ───────────────────────────────────────────────
    ownerEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === 'Escape') ownerEl.blur(); });
    ownerEl.addEventListener('blur', () => {
      const val = ownerEl.value.trim();
      if (val !== (item.owner||'')) {
        item.owner = val;
        persist(item.id, { owner: val });
      }
    });

    // ── Status: click to cycle ────────────────────────────────────────────
    statusBtn.addEventListener('click', () => {
      const next = nextStatus(item.status);
      item.status = next;
      statusBtn.className = `sbadge s-${next}`;
      statusBtn.innerHTML = `<span class="bdot"></span>${STATUS_LABEL[next]}`;
      persist(item.id, { status: next });
      refreshStats();
      showToast(`→ ${STATUS_LABEL[next]}`);
    });

    // ── Delete ────────────────────────────────────────────────────────────
    delBtn.addEventListener('click', () => {
      div.style.opacity = '0';
      div.style.transform = 'scale(0.95)';
      setTimeout(() => { div.remove(); deleteItem(item.id); }, 180);
    });

    return div;
  }

  // ── Inline add-item card ──────────────────────────────────────────────────
  function showAddCard(cat) {
    const grid = $(`g-${cat}`);
    if (grid.querySelector('.new-item-card')) return;

    const card  = document.createElement('div');
    card.className = 'card new-item-card';
    card.innerHTML = `<input class="new-item-input" placeholder="What are we building? (Enter to save, Esc to cancel)" autocomplete="off" />`;

    const input = card.querySelector('.new-item-input');
    let done    = false;

    const save = () => {
      if (done) return; done = true;
      const title = input.value.trim();
      if (title) addItem(cat, title);
      card.remove();
    };

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  save();
      if (e.key === 'Escape') { done = true; card.remove(); }
    });
    input.addEventListener('blur', save);

    grid.appendChild(card);
    input.focus();
  }

  // ── Section ───────────────────────────────────────────────────────────────
  function makeSection(sec) {
    const all     = Object.values(items)
                          .filter(i => i.cat === sec.key)
                          .sort((a,b) => (a.at||0) - (b.at||0));
    const visible = activeFilter ? all.filter(i => i.status === activeFilter) : all;

    const wrap = document.createElement('div');
    wrap.className = 'section';
    wrap.innerHTML = `
      <div class="sec-header">
        <span class="sec-flag">${sec.flag}</span>
        <span class="sec-title">${sec.label}</span>
        <span class="sec-badge">${visible.length}${activeFilter && visible.length !== all.length ? ` / ${all.length}` : ''}</span>
        <div class="sec-line"></div>
        <button class="add-btn" title="Add item">+</button>
      </div>
      <div class="cards" id="g-${sec.key}"></div>`;

    const grid = wrap.querySelector(`#g-${sec.key}`);
    visible.forEach((item, i) => grid.appendChild(makeCard(item, i+1)));
    wrap.querySelector('.add-btn').addEventListener('click', () => showAddCard(sec.key));

    return wrap;
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const main       = $('main');
    main.innerHTML   = '';

    const indiaRow   = Object.assign(document.createElement('div'), { className:'region-pair' });
    const foreignRow = Object.assign(document.createElement('div'), { className:'region-pair' });
    const overallWrap= Object.assign(document.createElement('div'), { className:'overall-wrap' });
    const msWrap     = Object.assign(document.createElement('div'), { className:'moonshot-wrap' });

    SECTIONS.forEach(sec => {
      const el = makeSection(sec);
      if      (sec.region === 'india')    indiaRow.appendChild(el);
      else if (sec.region === 'foreign')  foreignRow.appendChild(el);
      else if (sec.region === 'overall')  overallWrap.appendChild(el);
      else if (sec.region === 'moonshot') msWrap.appendChild(el);
    });

    main.appendChild(indiaRow);
    main.appendChild(foreignRow);
    main.appendChild(overallWrap);
    main.appendChild(msWrap);

    refreshStats();

    // Filter bar
    const fb = $('filterBar');
    if (activeFilter) {
      fb.style.display = 'flex';
      $('filterLabel').textContent = STATUS_LABEL[activeFilter];
    } else {
      fb.style.display = 'none';
    }

    // Timestamp
    const latest = Object.values(items).reduce((m,i) => Math.max(m, i.at||0), 0);
    $('ts').textContent = timeAgo(latest);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    firebaseMode = await tryFirebase();

    if (firebaseMode) {
      const snap = await getFn();
      if (!snap.exists()) {
        const seed = {};
        SEED.forEach((i, idx) => { seed[i.id] = { ...i, owner:'', at: Date.now() + idx }; });
        await setFn(seed);
      }
      onValueFn(dbRef, snapshot => {
        items = snapshot.val() || {};
        render();
      });
    } else {
      $('cfg-banner').style.display = 'block';
      const stored = localStorage.getItem('moonshots');
      if (stored) {
        items = JSON.parse(stored);
      } else {
        SEED.forEach((i, idx) => { items[i.id] = { ...i, owner:'', at: Date.now() + idx }; });
        localStorage.setItem('moonshots', JSON.stringify(items));
      }
      render();
    }
  }

  init();
</script>
</body>
</html>
